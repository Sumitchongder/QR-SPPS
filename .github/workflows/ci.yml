name: CI — Dependency & Import Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Dependencies & Imports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate core imports
        run: |
          python -c "
          import streamlit
          import plotly
          import pandas
          import numpy
          import scipy
          import networkx
          print('✅ All dashboard dependencies resolved successfully.')
          "

      - name: Check dashboard.py syntax
        run: |
          # Ensure dashboard.py actually exists before compiling
          if [ -f dashboard.py ]; then
            python -m py_compile dashboard.py
            echo "✅ dashboard.py syntax is valid."
          else
            echo "❌ dashboard.py not found!"
            exit 1
          fi

      - name: Verify data directory structure
        run: |
          python -c "
          import os, sys
          expected = [
              'data/QRSPPS_hamiltonians.pkl',
              'data/QRSPPS_vqe_results.pkl',
              'data/QRSPPS_policy_results.pkl',
              'data/QRSPPS_dosqpe_results.pkl',
              'data/QRSPPS_scaling_results.pkl',
          ]
          missing = [f for f in expected if not os.path.exists(f)]
          if missing:
              print('⚠️ Pre-computed data files not found:')
              for f in missing: print(f'   {f}')
              print('Dashboard will use synthetic fallback data for demo.')
              # To make the CI fail when files are missing, uncomment the next line:
              # sys.exit(1)
          else:
              print('✅ All pre-computed .pkl result files present.')
          "
