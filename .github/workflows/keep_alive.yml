# .github/workflows/keep_alive.yml
#
# QR-SPPS — Streamlit App Keep-Alive Workflow
# ─────────────────────────────────────────────────────────────────────────────
# Streamlit Community Cloud hibernates apps that receive no traffic for 7+ days.
# This workflow pings the live dashboard every hour, 24/7, ensuring zero
# cold-start latency for Fujitsu Challenge judges and stakeholders.
#
# Schedule:  every hour at minute 0
# Trigger:   cron + manual dispatch
# ─────────────────────────────────────────────────────────────────────────────

name: Keep Streamlit App Alive

on:
  schedule:
    # Runs every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual keep-alive ping"

jobs:
  ping:
    name: Ping QR-SPPS Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit App
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  QR-SPPS Keep-Alive Ping"
          echo "  Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Target: https://qr-spps.streamlit.app"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          HTTP_STATUS=$(curl --silent --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-max-time 60 \
            "https://qr-spps.streamlit.app")

          echo "  HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "  ✅ App is alive and responding."
          else
            echo "  ⚠️  Unexpected status code: $HTTP_STATUS"
            echo "  Attempting secondary ping..."
            curl --silent --output /dev/null \
              --max-time 60 \
              "https://qr-spps.streamlit.app" || true
            echo "  Secondary ping sent."
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
