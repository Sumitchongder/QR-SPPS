# .github/workflows/keep_alive.yml
#
# QR-SPPS — Streamlit App Keep-Alive Workflow
# ─────────────────────────────────────────────────────────────────────────────
# This workflow pings the live dashboard every 5 minutes to prevent hibernation.
# ─────────────────────────────────────────────────────────────────────────────

name: Keep Streamlit App Alive

on:
  schedule:
    # Runs every 2 minutes
    - cron: "*/2 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual keep-alive ping"

jobs:
  ping:
    name: Ping QR-SPPS Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit App
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  QR-SPPS Keep-Alive Ping (High Frequency)"
          echo "  Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Target: https://qr-spps.streamlit.app"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          HTTP_STATUS=$(curl --silent --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            "https://qr-spps.streamlit.app")

          echo "  HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "  ✅ App is alive and responding."
          else
            echo "  ⚠️  Unexpected status code: $HTTP_STATUS"
            # Secondary ping as backup
            curl --silent --output /dev/null --max-time 60 "https://qr-spps.streamlit.app" || true
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
